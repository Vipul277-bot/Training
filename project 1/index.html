<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">Expense Tracker</h1>

    <div class="card p-4 shadow">
        <form onsubmit="handleSubmit(event)">

            <div class="mb-3">
                <label class="form-label">Expense Amount</label>
                <input type="number" id="Amount" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Expense Info</label>
                <input type="text" id="Info" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Expense Category</label>
                <select id="Catagory" class="form-select">
                    <option value="Travel">Travel</option>
                    <option value="Food">Food</option>
                    <option value="Rent">Rent</option>
                    <option value="Recharge">Recharge</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Add Expense
            </button>

        </form>
    </div>

    <div class="card mt-4 p-3 shadow">
        <h4>Your Expenses</h4>
        <ul id="Expense" class="list-group mt-3"></ul>
    </div>

</div>

<!-- Bootstrap JS (optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="index.js"></script>
</body>
</html>
